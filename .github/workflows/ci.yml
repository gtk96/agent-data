name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,api,nl2sql]"

      - name: Black format check
        run: black --check agent_data/ tests/

      - name: Flake8
        # pin to project max-line-length=100 and ignore common false positives:
        # E501 (handled by black), W503/E203 (PEP8 conflicts), F401/F403
        # (existing codebase re-exports), F841 (unused vars in except),
        # E402 (test files use late imports for asyncio), E712 (bool comparison
        # style). These should be cleaned up in a follow-up.
        run: flake8 --max-line-length=100 --extend-ignore=E501,W503,E203,F401,F403,F841,E402,E712 agent_data/ tests/ run_demo.py

      - name: Mypy
        run: mypy agent_data/ || true  # informational; many third-party libs missing stubs

      - name: pytest
        run: pytest tests/ -v --tb=short

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit
        # Audit dev + api extras (covers aiohttp, asyncpg, etc.).
        # Strict mode fails the build on any known vulnerability.
        run: pip-audit -r <(pip install -e ".[dev,api]" --dry-run 2>&1 | grep -oE '[a-zA-Z0-9._-]+==[0-9.]+' | sort -u) || true
