name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          flake8 agent_data/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 agent_data/ --count --max-complexity=10 --max-line-length=100 --statistics

      - name: Check formatting with black
        run: |
          black --check agent_data/ tests/

      - name: Type check with mypy
        run: |
          mypy agent_data/ --ignore-missing-imports || true

      - name: Run tests
        run: |
          pytest tests/ -v --cov=agent_data --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false