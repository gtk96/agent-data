<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>智能问数</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-title">智能问数</div>
    <div class="status" aria-live="polite">
      <span id="header-status-dot" class="status-dot status-dot--ok" aria-hidden="true"></span>
      <span id="header-status-text">● 引擎 ready</span>
    </div>
  </header>

  <main id="chat-list" class="chat" role="log" aria-live="polite" aria-busy="false">
    <section class="chat-empty" id="chat-empty">
      <h1>智能问数</h1>
      <p>用中文/英文问数据库，回车即得。</p>
      <div class="chips" id="chip-list"></div>
    </section>
  </main>

  <form class="composer" id="composer" autocomplete="off">
    <div class="composer-inner">
      <input
        id="chat-input"
        type="text"
        name="q"
        placeholder="问点什么…"
        aria-label="输入自然语言问题"
        maxlength="1000"
        required
      />
      <span class="spinner" id="spinner" hidden>生成中…</span>
    </div>
  </form>

  <script src="/static/app.js" defer></script>
</body>
</html>
